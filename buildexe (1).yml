name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - 'app_server.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name uid_extractor app_server.py

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: uid_extractor-windows
          path: dist/uid_extractor.exe
